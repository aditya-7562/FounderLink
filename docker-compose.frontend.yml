version: "3.9"

networks:
  proxy-net:
    external: true

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: founderlink/frontend:${TAG:-latest}
    container_name: frontend
    networks:
      - proxy-net
    restart: unless-stopped
    # Port exposure is optional if proxy-net is used and Nginx Proxy Manager handles it
    # But usually, it needs to listen on 80 within the network
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
