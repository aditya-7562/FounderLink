spring:
  application:
    name: startup-service-test
  config:
    import: ""
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  data:
    redis:
      repositories:
        enabled: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

server:
  port: 0

rabbitmq:
  exchange: test.exchange
  startup:
    queue: test.startup.queue
    routing-key: startup.*
    deleted:
      routing-key: startup.deleted
  investment:
    deleted:
      queue: test.investment.queue
  team:
    deleted:
      queue: test.team.queue
