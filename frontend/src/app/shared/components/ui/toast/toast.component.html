<div class="toast-container">
  @for (toast of uiNotifier.toasts(); track toast.id) {
    <div class="toast-item" [ngClass]="['toast-' + toast.type]" (click)="uiNotifier.remove(toast.id)">
      <div class="toast-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [innerHTML]="getIcon(toast.type)">
        </svg>
      </div>
      <div class="toast-content">
        @if (toast.title) {
          <div class="toast-title">{{ toast.title }}</div>
        }
        <div class="toast-message">{{ toast.message }}</div>
      </div>
      <button class="toast-close" (click)="uiNotifier.remove(toast.id); $event.stopPropagation()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  }
</div>
